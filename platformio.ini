[platformio]
; default_envs = esp32-2432s024c
default_envs = esp32-3248s035

[env]
platform = espressif32@6.10.0
board = esp32dev
framework = arduino
board_build.partitions = partitions_3mb_no_ota.csv
extra_scripts = pre:scripts/embed_assets.py
monitor_speed = 115200

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    lvgl/lvgl @ ^8.4.0
    ESP32Async/AsyncTCP @ ^3.4.7
    ESP32Async/ESPAsyncWebServer @ ^3.8.1
    bblanchon/ArduinoJson @ ^7.4.2
    esphome/ESP32-audioI2S @ ^2.0.7
    knolleary/PubSubClient @ ^2.8
    bitbank2/JPEGENC @ ^1.1.0

build_flags =
    -D LV_CONF_INCLUDE_SIMPLE=1
    -D LV_CONF_PATH=lv_conf.h
    -D USER_SETUP_LOADED=1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TOUCH_CS=-1
    -D TFT_BL=27
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    -D SUPPORT_TRANSACTIONS=1

[env:esp32-2432s024c]
build_flags =
    ${env.build_flags}
    -D ILI9341_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D BOARD_ESP32_2432S024C=1

[env:esp32-3248s035]
build_flags =
    ${env.build_flags}
    -D ST7796_DRIVER=1
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    -D BOARD_ESP32_3248S035=1
