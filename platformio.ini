[platformio]
; default_envs = esp32-2432s024c
; default_envs = esp32-3248s035
; default_envs = uedx24320028e-wb-a
default_envs = uedx32480035e-wb-a
; default_envs = esp32-s3-3248s035-n16r8

[env]
platform = espressif32@6.10.0
board = esp32dev
framework = arduino
board_build.partitions = partitions_3mb_no_ota.csv
extra_scripts =
    ; pre:scripts/generate_multilang_font.py
    pre:scripts/embed_assets.py
monitor_speed = 115200

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    lvgl/lvgl @ ^8.4.0
    ESP32Async/AsyncTCP @ ^3.4.7
    ESP32Async/ESPAsyncWebServer @ ^3.8.1
    bblanchon/ArduinoJson @ ^7.4.2
    esphome/ESP32-audioI2S @ ^2.0.7
    knolleary/PubSubClient @ ^2.8
    adafruit/Adafruit NeoPixel @ ^1.12.5

build_flags =
    -I include
    -D LV_CONF_INCLUDE_SIMPLE=1
    -D LV_CONF_PATH=lv_conf.h
    -D LV_LVGL_H_INCLUDE_SIMPLE=1
    -D USER_SETUP_LOADED=1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D TFT_RST=-1
    -D TOUCH_CS=-1
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
    -D SUPPORT_TRANSACTIONS=1

[env:esp32-2432s024c]
build_flags =
    ${env.build_flags}
    -D ILI9341_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_BL=27
    -D BOARD_ESP32_2432S024C=1

[env:esp32-3248s035]
build_flags =
    ${env.build_flags}
    -D ST7796_DRIVER=1
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_BL=27
    -D BOARD_ESP32_3248S035=1

[env:esp32-s3-3248s035-n16r8]
board = esp32-s3-devkitc1-n16r8
board_build.partitions = default_16MB.csv
build_flags =
    ${env.build_flags}
    -D ST7796_DRIVER=1
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    -D TFT_MISO=20
    -D TFT_MOSI=9
    -D TFT_SCLK=19
    -D TFT_CS=47
    -D TFT_DC=48
    -D TFT_BL=8
    -D USE_HSPI_PORT=1
    -D BOARD_ESP32S3_3248S035_N16R8=1

[env:uedx24320028e-wb-a]
board = esp32-s3-devkitc1-n16r8
board_build.partitions = default_16MB.csv
lib_ignore =
    TFT_eSPI
lib_deps =
    ${env.lib_deps}
build_flags =
    ${env.build_flags}
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_BL=13
    -D BOARD_UEDX24320028E_WB_A=1

[env:uedx32480035e-wb-a]
board = esp32-s3-devkitc1-n16r8
board_build.partitions = default_16MB.csv
lib_ignore =
    TFT_eSPI
lib_deps =
    ${env.lib_deps}
build_flags =
    ${env.build_flags}
    -D ST7796_DRIVER=1
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    -D TFT_BL=13
    -D BOARD_UEDX32480035E_WB_A=1

[env:uedx32480035e-wb-a-backlight-test]
board = esp32-s3-devkitc1-n16r8
board_build.partitions = default_16MB.csv
lib_ignore =
    TFT_eSPI
build_src_filter =
    -<*>
    +<backlight_test_main.cpp>
build_flags =
    ${env.build_flags}
    -D BACKLIGHT_TEST_BUILD=1
    -D TFT_BL=13
    -D RGB_LED_PIN=0
    -D BUZZER_PIN=18
    -D TOUCH_RST=2
    -D TOUCH_SCL=3
    -D TOUCH_SDA=1
    -D TOUCH_INT=4

[env:uedx32480035e-wb-a-display-test]
board = esp32-s3-devkitc1-n16r8
board_build.partitions = default_16MB.csv
lib_ignore =
    TFT_eSPI
build_src_filter =
    -<*>
    +<display_hello_test_main.cpp>
    +<display_compat.cpp>
build_flags =
    ${env.build_flags}
    -D DISPLAY_HELLO_TEST_BUILD=1
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    -D TFT_BL=13
    -D LCD_PIN_SCK_OVERRIDE=12
    -D LCD_PIN_MOSI_OVERRIDE=11
    -D LCD_PIN_CS_OVERRIDE=42
    -D LCD_PIN_DC_OVERRIDE=40
    -D LCD_PIN_RST_OVERRIDE=39
    -D RGB_LED_PIN=0
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_UEDX32480035E_WB_A=1
